<style>
body {

.header {

}

.section-arrow {

}

}

.row {

}

<div id="vocab"></div>

<script>
const data = jsyaml.load(document.getElementById("vocab-data").textContent);
const root = document.getElementById("vocab");
const searchInput = document.getElementById("searchInput");
const searchBtn = document.getElementById("searchBtn");

let currentQuery = "";

// Step 1: measure max widths
const measureDiv = document.createElement('div');
measureDiv.style.position = 'absolute';
measureDiv.style.visibility = 'hidden';
measureDiv.style.top = '-9999px';
document.body.appendChild(measureDiv);

const colMaxWidths = [0,0,0];
data.forEach(section => {
  section.entries.forEach(entry => {
    const row = renderEntry(entry, true);
    measureDiv.appendChild(row);
    row.querySelectorAll('.cell').forEach((cell, i) => {
      const width = cell.getBoundingClientRect().width;
      if (width > colMaxWidths[i]) colMaxWidths[i] = width;
    });
    measureDiv.removeChild(row);
  });
});
document.body.removeChild(measureDiv);

function renderAll() {
  root.innerHTML = "";
  data.forEach(section => {
    const filteredEntries = section.entries.filter(entry => {
      const term = entry.term?.toLowerCase() || "";
      const reading = entry.reading?.toLowerCase() || "";
      const meaning = entry.meaning?.toLowerCase() || "";
      return currentQuery === "" || term.includes(currentQuery) || reading.includes(currentQuery) || meaning.includes(currentQuery);
    });
    if (filteredEntries.length > 0) {
      renderSection(section, filteredEntries);
    }
  });
}

function renderSection(section, entries) {
  const wrapper = document.createElement("section");
  wrapper.className = "vocab-section";

  const title = document.createElement("h2");
  title.className = "section-title";

  const titleText = document.createElement("span");
  titleText.textContent = section.section;

  const arrow = document.createElement("span");
  arrow.className = "section-arrow";
  arrow.textContent = currentQuery ? "▼" : "▶"; // auto-open if searching

  title.appendChild(titleText);
  title.appendChild(arrow);
  wrapper.appendChild(title);

  const body = document.createElement("div");
  body.className = "section-body";
  if (!currentQuery) body.classList.add("collapsed");

  const table = document.createElement("div");
  table.className = "table";

  entries.forEach(entry => {
    const row = renderEntry(entry);
    row.querySelectorAll('.cell').forEach((cell, i) => {
      cell.style.width = colMaxWidths[i] + "px";
    });
    table.appendChild(row);
  });

  body.appendChild(table);
  wrapper.appendChild(body);

  title.addEventListener("click", () => {
    body.classList.toggle("collapsed");
    arrow.textContent = body.classList.contains("collapsed") ? "▶" : "▼";
  });

  root.appendChild(wrapper);
}

function renderEntry(entry, forMeasure = false) {
  const row = document.createElement("div");
  row.className = "row";

  const termCell = document.createElement("div");
  termCell.className = "cell";
  add(termCell, "term", entry.term);
  if (entry.example) add(termCell, "example", entry.example);
  row.appendChild(termCell);

  const readingCell = document.createElement("div");
  readingCell.className = "cell";
  add(readingCell, "reading", entry.reading);
  row.appendChild(readingCell);

  const meaningCell = document.createElement("div");
  meaningCell.className = "cell";
  add(meaningCell, "meaning", entry.meaning);
  if (entry.explanation) add(meaningCell, "explanation", entry.explanation);
  if (entry.notes) add(meaningCell, "notes", entry.notes);
  row.appendChild(meaningCell);

  return row;
}

function add(parent, cls, value) {
  if (!value) return;
  const el = document.createElement("div");
  el.className = cls;
  el.textContent = value;
  parent.appendChild(el);
}

function performSearch() {
  currentQuery = searchInput.value.trim().toLowerCase();
  renderAll();
}

searchBtn.addEventListener("click", performSearch);
searchInput.addEventListener("keydown", e => {
  if (e.key === "Enter") performSearch();
});

// Initial render
renderAll();
</script>
