<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>囲碁用語 Go Terminology</title>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #111;
      color: #eee;
      line-height: 1.6;
      padding: 2rem;
    }

    h1 {
      margin-bottom: 2rem;
    }

    .vocab-section {
      margin-bottom: 2.5rem;
    }

    .section-title {
      font-size: 2rem;
      border-bottom: 2px solid #444;
      padding-bottom: 0.4rem;
      margin-bottom: 0.5rem;
      color: #adb5bd;
      cursor: pointer; /* clickable */
      user-select: none;
    }

    .section-body.collapsed {
      display: none;
    }

    .entry {
      display: grid;
      grid-template-columns: auto auto auto 1fr;
      gap: 0.4rem 1rem;
      padding: 0.6rem 0;
      border-bottom: 1px dashed #333;
    }

    .term {
      font-size: 3em;
      color: #C0391B;
    }

    .reading {
      color: #4dabf7;
      font-size: 2em;
    }

    .meaning {
      color: #BF86DA;
      font-size: 2em;
    }

    .explanation {
      grid-column: auto;
      font-style: italic;
      color: #ffd43b;
    }

    .example,
    .notes {
      grid-column: 1 / -1;
      margin-left: 0.2rem;
      color: #b197fc;
      font-style: italic;
    }

    .notes {
      color: #868e96;
      font-style: normal;
    }

    /* visual indicator for collapsed state */
    .section-title::after {
      content: " ▼";
      font-size: 0.8em;
      color: #888;
    }

    .section-body.collapsed + .section-title::after {
      content: " ▶";
    }
  </style>
</head>
<body>

<h1>囲碁用語 Go Terminology</h1>

<script type="application/yaml" id="vocab-data">

- section: 形 (かたち) Shapes
  entries:
    - term: 猫の顔
      reading: ねこのかお
      meaning: tiger mouth

    - term: トックリ形
      reading: とっくりがた
      meaning: sake bottle shape
      explanation: 一間トビ with けいま in the middle

      reading:

      reading:

    - term: おげいまがかり
      reading:

    - term: にけんたがかり
      reading:

    - term: ハサミ
      reading:
      meaning: pincer
</script>

<div id="vocab"></div>

<script>
const data = jsyaml.load(
  document.getElementById("vocab-data").textContent
)

const root = document.getElementById("vocab")

data.forEach(renderSection)

function renderSection(section) {
  const wrapper = el("section", "vocab-section")

  // section title
  const title = el("h2", "section-title", section.section)
  wrapper.appendChild(title)

  // section body container (collapsible)
  const body = el("div", "section-body collapsed")
  section.entries.forEach(entry => {
    body.appendChild(renderEntry(entry))
  })
  wrapper.appendChild(body)

  // Click listener toggles collapse
  title.addEventListener("click", () => {
    body.classList.toggle("collapsed")
  })

  root.appendChild(wrapper)
}

function renderEntry(entry) {
  const div = el("div", "entry")
  add(div, "term", entry.term)
  add(div, "reading", entry.reading)
  add(div, "meaning", entry.meaning)
  add(div, "explanation", entry.explanation)
  add(div, "example", entry.example)
  add(div, "notes", entry.notes)
  return div
}

function add(parent, cls, value) {
  if (!value) return
  parent.appendChild(el("span", cls, value))
}

function el(tag, cls, text) {
  const e = document.createElement(tag)
  if (cls) e.className = cls
  if (text) e.textContent = text
  return e
}
</script>

</body>
</html>
