<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>囲碁用語 Go Terminology</title>

<script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>

<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #111;
  color: #eee;
  line-height: 1.6;
  padding: 2rem;
}

h1 { margin-bottom: 2rem; }

.vocab-section { margin-bottom: 2.5rem; }

.section-title {
  font-size: 2rem;
  border-bottom: 2px solid #444;
  padding-bottom: 0.4rem;
  margin-bottom: 0.5rem;
  color: #adb5bd;
  cursor: pointer;
  user-select: none;
}

.section-body.collapsed { display: none; }

/* Table layout for entries */
.table { display: table; width: 100%; table-layout: auto; border-collapse: collapse; }

.row { display: table-row; border-bottom: 1px dashed #9084C8; }

.cell {
  display: table-cell;
  vertical-align: top;
  padding-right: 1rem;
  white-space: nowrap;       /* keep everything on one line */
}

.term { font-size: 2.5em; color: #C0391B; }
.example { font-size: 1.6em; color: #A37F33; }
.reading { font-size: 1.8em; color: #4dabf7; }
.meaning { font-size: 1.8em; color: #BF86DA; }
.explanation { font-size: 1.6em; color: #0EA098; }
.notes { font-size: 1.6em; color: #868e96; }

/* Collapse arrow */
.section-title::after {
  content: " ▼";
  font-size: 0.8em;
  color: #888;
}
.section-body.collapsed + .section-title::after {
  content: " ▶";
}
</style>
</head>
<body>

<h1>囲碁用語 Go Terminology</h1>

<script type="application/yaml" id="vocab-data">

    - term: 曲がり

    - term: 割込み

    - term: ノゾキ
      reading:

    - term: やぐらノゾキ
      reading:

      reading:

- section: 戦略 (せんりゃく) Strategy
  entries:

  entries:

    - term: 味消し

    - term: 狙い

  entries:
    - term: 対戦開始

    - term: 複雑
      reading: ふくざつ

    - term: せっかち
      reading:

    - term: 悔し
      reading: くやし
      meaning: frustrating

    - term: 我慢して

      meaning: to endure
      explanation: e.g. a situation

    - term: 攻めたい

    - term: 非常

      meaning: emergency
      example: 非常に良くなかった。（ひじょうによくなかった。）

    - term: これはつぶしかない

    - term: めちゃくちゃ取り行く方針

    - term: とりあえずもうダめ詰めて

    - term: 弱体化はしたん

- section: 形 (かたち) Shapes
  entries:
    - term: 猫の顔
      reading: ねこのかお
      meaning: tiger mouth

    - term: トックリ形
      reading: とっくりがた
      meaning: sake bottle shape
      explanation: 一間トビ with けいま in the middle

    - term: 犬の顔

- section: 布石 (ふせき) Opening Theory
  entries:
    - term: 締まり
      reading: シマリ
      meaning: corner enclosure

    - term: 掛かり
      reading: カカリ
      meaning: corner approach

    - term: ケイマガカリ
      reading: 
      meaning: one space low approach

    - term: いっけんたがかり
      reading: 
      meaning: one space high approach

    - term: おげいまがかり
      reading: 
      meaning: two space low approach

    - term: にけんたがかり
      reading: 
      meaning: two space high approach

    - term: 裾がかり
      reading: すそがかり
      meaning: skirt approach, sleeve approach
      explanation: classic 2-5 invasion under 4-4

    - term: 両ガカリ
      reading: りょうがかり
      meaning: double approach

    - term: ハサミ
      reading:
      meaning: pincer
</script>

<div id="vocab"></div>

<script>
const data = jsyaml.load(document.getElementById("vocab-data").textContent);
const root = document.getElementById("vocab");

// Step 1: Create invisible master table to compute column widths
const masterTable = document.createElement('div');
masterTable.style.display = 'table';
masterTable.style.visibility = 'hidden';
masterTable.style.position = 'absolute';
masterTable.style.top = '-9999px';
masterTable.style.tableLayout = 'auto';
document.body.appendChild(masterTable);

data.forEach(section => {
  section.entries.forEach(entry => masterTable.appendChild(renderEntry(entry)));
});

// Get computed widths from master table
const masterCells = masterTable.querySelectorAll('.row:first-child .cell');
const colWidths = [];
masterCells.forEach(cell => colWidths.push(cell.getBoundingClientRect().width));

// Remove the master table
document.body.removeChild(masterTable);

// Step 2: Render visible tables using consistent widths
data.forEach(renderSection);

function renderSection(section) {
  const wrapper = document.createElement("section");
  wrapper.className = "vocab-section";

  const title = document.createElement("h2");
  title.className = "section-title";
  title.textContent = section.section;
  wrapper.appendChild(title);

  const body = document.createElement("div");
  body.className = "section-body collapsed";

  const table = document.createElement("div");
  table.className = "table";

  section.entries.forEach(entry => {
    const row = renderEntry(entry);
    // Apply consistent column widths
    row.querySelectorAll('.cell').forEach((cell, i) => {
      cell.style.width = colWidths[i] + "px";
    });
    table.appendChild(row);
  });

  body.appendChild(table);
  wrapper.appendChild(body);

  title.addEventListener("click", () => body.classList.toggle("collapsed"));
  root.appendChild(wrapper);
}

function renderEntry(entry) {
  const row = document.createElement("div");
  row.className = "row";

  // Term + example
  const termCell = document.createElement("div");
  termCell.className = "cell";
  add(termCell, "term", entry.term);
  if (entry.example) add(termCell, "example", entry.example);
  row.appendChild(termCell);

  // Reading
  const readingCell = document.createElement("div");
  readingCell.className = "cell";
  add(readingCell, "reading", entry.reading);
  row.appendChild(readingCell);

  // Meaning + explanation + notes
  const meaningCell = document.createElement("div");
  meaningCell.className = "cell";
  add(meaningCell, "meaning", entry.meaning);
  if (entry.explanation) add(meaningCell, "explanation", entry.explanation);
  if (entry.notes) add(meaningCell, "notes", entry.notes);
  row.appendChild(meaningCell);

  return row;
}

function add(parent, cls, value) {
  if (!value) return;
  const el = document.createElement("div");
  el.className = cls;
  el.textContent = value;
  parent.appendChild(el);
}
</script>

</body>
</html>
